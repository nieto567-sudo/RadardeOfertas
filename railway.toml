# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  RadardeOfertas – Railway configuration                                  ║
# ║                                                                          ║
# ║  This file configures the DEFAULT service (publish loop).                ║
# ║  The service initialises the DB schema and then runs the scrape-and-     ║
# ║  publish loop that finds offers and posts them to the Telegram channel.  ║
# ╚══════════════════════════════════════════════════════════════════════════╝

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Initialise the DB schema then start the offer-publishing loop.
# `init-db` is idempotent (CREATE TABLE IF NOT EXISTS), safe to run on every start.
# `run-loop --interval 300` scrapes offers and posts them to Telegram every 300 s.
startCommand = "python main.py init-db && python main.py run-loop --interval 300"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
